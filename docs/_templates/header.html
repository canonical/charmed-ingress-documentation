<header id="header" class="p-navigation">

  <!-- Google Tag Manager -->
  <script>
    (function(w, d, s, l, i) {
      w[l] = w[l] || [];
      w[l].push({
        'gtm.start': new Date().getTime(),
        event: 'gtm.js'
      });
      var f = d.getElementsByTagName(s)[0];
      var j = d.createElement(s);
      var dl = '';
      if (l != 'dataLayer') {
          dl = '&l=' + l;
      }
      j.async = true;
      j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
      f.parentNode.insertBefore(j, f);
    })(window, document, 'script', 'dataLayer', 'GTM-KNX3CJC');
  </script>

  <!-- Override theme's dropdown toggle to support multiple independent dropdowns -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      document.addEventListener("click", function() {
        document.querySelectorAll(".more-links-dropdown").forEach(function(m) {
          m.style.display = "none";
        });
      });
      document.querySelectorAll(".nav-more-links").forEach(function(toggle) {
        toggle.addEventListener("click", function(event) {
          event.preventDefault();
          event.stopPropagation();
          var menu = this.nextElementSibling;
          var isVisible = menu.style.display === "block";
          document.querySelectorAll(".more-links-dropdown").forEach(function(m) {
            m.style.display = "none";
          });
          if (!isVisible) {
            menu.style.display = "block";
          }
        }, true);
      });
    });
  </script>

  <div class="p-navigation__nav" role="menubar">

    <ul class="p-navigation__links" role="menu">

      <li>
        <a class="p-logo" href="https://{{ product_page }}" aria-current="page">
          <img src="{{ pathto(product_tag,1) }}" alt="Logo" class="p-logo-image">
          <div class="p-logo-text p-heading--4">{{ project }}
          </div>
        </a>
      </li>

      {% if header_nav_dropdowns %}
      {% for dropdown_label, links in header_nav_dropdowns.items() %}
      <li>
        <a href="#" class="p-navigation__link nav-more-links">{{ dropdown_label }}</a>
        <ul class="more-links-dropdown">

          {% for link_label, url in links.items() %}
          <li>
            <a href="{{ url }}" class="p-navigation__sub-link p-dropdown__link">{{ link_label }}</a>
          </li>
          {% endfor %}

        </ul>
      </li>
      {% endfor %}
      {% endif %}

    </ul>
  </div>
</header>
